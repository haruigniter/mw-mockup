<div class="stepper"><div class="step done"><div class="step-num">✓</div><span class="step-label">工事内容入力</span></div><div class="step-sep"></div><div class="step done"><div class="step-num">✓</div><span class="step-label">作業者・協力業者</span></div><div class="step-sep"></div><div class="step active"><div class="step-num">3</div><span class="step-label">車両・書類</span></div><div class="step-sep"></div><div class="step "><div class="step-num">4</div><span class="step-label">確認・提出</span></div></div>
<div class="main">
<div class="card">
  <div class="card-title">車両情報</div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">車両番号</label><input type="text" class="form-input" value="品川 500 あ 1234"></div>
    <div class="form-group"><label class="form-label">車種・備考</label><input type="text" class="form-input" value="ハイエース（白）"></div>
  </div>
</div>
<div class="card">
  <div class="card-title">添付書類</div>
  <div class="notice-box">工事種別「空調・設備工事」では以下の書類が必要です。</div>
  <div class="form-group">
    <label class="form-label">安全計画書<span class="req">※必須</span></label>
    <div style="border:1.5px dashed var(--gray-300);border-radius:8px;padding:20px;text-align:center;background:var(--gray-50);">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="1.5" style="width:24px;height:24px;margin:0 auto 8px;"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <div style="font-size:13px;color:var(--gray-500);">安全計画書_山田建設_20260610.pdf</div>
      <div style="font-size:11px;color:var(--green);margin-top:4px;">添付済み</div>
    </div>
  </div>
</div>
<div class="card">
  <div class="card-title">注意事項への同意</div>
  <div style="background:var(--gray-50);border-radius:8px;padding:12px;font-size:12px;color:var(--gray-600);line-height:1.8;margin-bottom:12px;">
    1. 作業開始前に必ず構内ルールの説明を受けてください。<br>
    2. 安全保護具（ヘルメット・安全靴等）を着用してください。<br>
    3. 作業区域外への立ち入りは禁止です。
  </div>
  <label class="checkbox-label"><input type="checkbox" checked>上記の注意事項を確認し、同意します</label>
</div>
